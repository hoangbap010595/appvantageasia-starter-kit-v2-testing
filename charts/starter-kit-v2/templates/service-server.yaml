apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-server"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  ports:
    - port: 3000
      targetPort: http
      name: http
  selector:
    {{- include "app.selectorLabels" .| nindent 4 }}
    app.kubernetes.io/svc: server
  type: ClusterIP
