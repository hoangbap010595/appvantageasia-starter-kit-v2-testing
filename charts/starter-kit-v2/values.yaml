# Application settings
global:
  # additional labels to apply on worker/server pods
  extraLabels: { }

  # automatically redeploy when there's a change on secrets or configmaps
  rollWorkload: true

  # strategy applied on the deployment for servers & workers
  deploymentStrategy:
    type: RollingUpdate

  # image settings
  image:
    registry: ''
    repository: ''
    pullPolicy: IfNotPresent
    tag: 'latest'
    pullSecret: [ ]

  # service account settings
  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Annotations to add to the service account
    annotations: { }
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""

  # extra environment configuration
  extraEnvs: [ ]
  # - secretRef:
  #     name: my-secret

ingress:
  enabled: false
  ingressClass: ""

  annotations: { }
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"

  hosts:
    - host: app.local
      paths: [ ]

  tls: [ ]
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local


