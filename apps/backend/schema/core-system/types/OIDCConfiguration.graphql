"""
OpenID Connect Configuration
"""
type OIDCConfiguration {
    """
    If true, the OIDC configuration is enforced over basic authentication.
    """
    enforced: Boolean!

    """
    The OIDC issuer URL.
    """
    endpoint: String!

    """
    Client ID
    """
    clientId: String!

    """
    Callback URL
    """
    callback: String!
}
