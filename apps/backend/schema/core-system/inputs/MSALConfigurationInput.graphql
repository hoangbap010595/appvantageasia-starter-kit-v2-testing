"""
MSAL Configuration
"""
input MSALConfigurationInput {
    """
    If true, the MSAL configuration is enforced over basic authentication.
    """
    enforced: Boolean!

    """
    Authority URL
    """
    authority: String!

    """
    Client ID
    """
    clientId: String!

    """
    Client Secret
    """
    clientSecret: String
}
