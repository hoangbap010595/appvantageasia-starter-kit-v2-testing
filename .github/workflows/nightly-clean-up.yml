name: Nightly Clean Up

on:
  schedule:
    - cron: '0 17 * * *'

jobs:
  cleanup-images:
    name: Delete old images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.repository }}
          package-type: container
          min-versions-to-keep: 1
